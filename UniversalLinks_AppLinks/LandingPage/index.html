<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Redirecting...</title>
    <style>
        body {
            background-color: #0f172a;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
    </style>
    <script>
        const userAgent = navigator.userAgent || navigator.vendor || window.opera;

        // App Store URLs
        const androidUrl = "https://play.google.com/store/apps/details?id=com.facebook.katana";
        const iosUrl = "https://apps.apple.com/app/id284882215";

        const isIOS = /iPad|iPhone|iPod/.test(userAgent) ||
                      (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

        const isAndroid = /android/i.test(userAgent) ||
                          (/Linux/i.test(userAgent) && !isIOS && navigator.maxTouchPoints > 1);

        // Instant redirect
        if (isAndroid) {
            window.location.replace(androidUrl);
        } else if (isIOS) {
            window.location.replace(iosUrl);
        } else {
            // Unlikely to hit this if scanned properly from mobile,
            // but if opened on desktop, you can redirect them to a default webpage.
            // Leaving it blank per the requirement of not showing a web page.
        }
    </script>
</head>
<body>
</body>
</html>
